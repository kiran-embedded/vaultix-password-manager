name: vaultix_app
description: Vaultix — Premium Password Manager. Secure. Simple. Powerful.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # UI & Design
  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.0.10+1

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.2.0
  clipboard: ^0.1.3
  crypto: ^3.0.3
  encrypt: ^5.0.3
  vibration: ^2.0.1
  google_sign_in: ^6.2.1
  otp: ^3.1.2
  base32: ^2.1.3
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/database/
